# Nurox ERP — Local Development Stack
# Usage: docker compose up -d
# Docs: NUROX_ERP_MASTER_ARCHITECTURE.md § Appendix E

services:
  # ─── PostgreSQL 18 ──────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: nurox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nurox
      POSTGRES_PASSWORD: nurox_dev
      POSTGRES_DB: nurox_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurox -d nurox_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 (sessions, cache, rate limits, BullMQ) ─────────────
  redis:
    image: redis:7-alpine
    container_name: nurox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ─── MinIO (S3-compatible file storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nurox-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MeiliSearch (full-text search) ─────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: nurox-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: nurox_search_dev_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MailHog (local email testing) ──────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nurox-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI (view sent emails)

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data: